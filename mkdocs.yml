site_name: Analista di Sistema
site_description: Guida completa al lavoro quotidiano e alle competenze di un Analista di Sistema
site_author: Massim Mori
site_url: https://gmorimac-droid.github.io/analista-di-sistema/

repo_name: gmorimac-droid/analista-di-sistema
repo_url: https://github.com/gmorimac-droid/analista-di-sistema

theme:
  name: material
  language: it
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passa al tema scuro
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passa al tema chiaro

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gmorimac-droid

copyright: Copyright © 2026

